# Traefik v3 static configuration
api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

# Let's Encrypt via Cloudflare DNS challenge — gets a wildcard cert for *.rainforest.tools
certificatesResolvers:
  letsencrypt:
    acme:
      email: contact@rainforest.tools
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

providers:
  docker:
    exposedByDefault: false
    network: traefik
  file:
    directory: /config/dynamic
    watch: true

log:
  level: INFO

accessLog: {}
