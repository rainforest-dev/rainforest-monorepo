packages:
  - apps/*
  - libs/*

catalog:
  '@material/material-color-utilities': ^0.3.0
  '@tailwindcss/typography': ^0.5.19
  '@tailwindcss/vite': 4.2.2
  vite: 8.0.8
  '@types/node': ^25.0.10
  '@types/react': 19.2.9
  '@types/react-dom': 19.2.3
  lit: 3.3.2
  next: 16.2.3
  react: 19.2.3
  react-dom: 19.2.3
  tailwindcss: 4.2.2
  typescript: 5.9.3

# pnpm 11 settings (moved from package.json pnpm field)
peerDependencyRules:
  allowedVersions:
    '@vite-pwa/astro>astro': '6'
    '@nanostores/lit>nanostores': '1'

# Disable minimumReleaseAge during migration to avoid lockfile instability
# (pnpm 11 default is 1440 — re-enable after lockfile stabilises)
minimumReleaseAge: 0

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  better-sqlite3: true
  core-js: true
  es5-ext: true
  esbuild: true
  msw: true
  nx: true
  sharp: true
  unrs-resolver: true
