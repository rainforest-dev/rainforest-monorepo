name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      # Nx Cloud distributed task execution — opt-in via repository variable.
      # Set NX_CLOUD_ENABLED=true in Settings → Variables → Actions to enable.
      - name: Start Nx Cloud CI run
        if: vars.NX_CLOUD_ENABLED == 'true'
        run: pnpm dlx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="lint,test,typecheck"

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v5

      - run: pnpm exec nx affected -t lint test typecheck
